name = "TestLib"
version = "0.1.0"
defaultTargets = ["TestLib"]

[[require]]
name = "LeanPy"
path = "../../"

[[lean_lib]]
name = "TestLib"
moreLinkObjs = ["LeanPy/LeanPy:static", "LeanPy/leanPyNative:static", "Pantograph/Pantograph:static"]
precompileModules = true
defaultFacets = ["shared"]
moreLinkArgs = [
  "-Wl,-headerpad_max_install_names",
]
