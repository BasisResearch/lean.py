name = "SymPyTactic"
version = "0.1.0"
defaultTargets = ["SymPyTactic"]

[[require]]
name = "LeanPy"
path = "../../.."

[[lean_lib]]
name = "SymPyTactic"
moreLinkObjs = ["LeanPy/LeanPy:static", "LeanPy/leanPyNative:static", "Pantograph/Pantograph:static", "Regex/Regex:static"]
precompileModules = true
defaultFacets = ["shared"]
moreLinkArgs = [
  "-Wl,-headerpad_max_install_names",
]
