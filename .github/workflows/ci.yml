name: CI
on: [push, pull_request]

jobs:
  # Run the full test suite on Linux + macOS. The Pantograph Lake
  # dependency pins us to 4.29.1; nightly is allowed to fail.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain:
          - "default"                         # what lean-toolchain pins (v4.29.1)
          - "leanprover/lean4:nightly"        # tracks main; allowed to fail
        include:
          - toolchain: "leanprover/lean4:nightly"
            allow_failure: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Pick Lean toolchain
        id: toolchain
        shell: bash
        run: |
          if [ "${{ matrix.toolchain }}" = "default" ]; then
            echo "name=$(cat lean-toolchain)" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ matrix.toolchain }}" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.toolchain }}" > lean-toolchain
            echo "${{ matrix.toolchain }}" > tests/lean/lean-toolchain
          fi

      - name: Install Lean toolchain
        shell: bash
        run: |
          elan toolchain install ${{ steps.toolchain.outputs.name }}
          elan default ${{ steps.toolchain.outputs.name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Install demo dependencies (sympy, numpy)
        run: uv pip install sympy numpy

      - name: Build root Lake project
        run: lake build

      - name: Build TestLib (test fixture)
        run: lake build TestLib:shared
        working-directory: tests/lean

      - name: Inspect tests/lean build output (diagnostic)
        if: always()
        run: |
          echo "--- tests/lean/.lake/build ---"
          find tests/lean/.lake/build -maxdepth 5 -type f 2>/dev/null | sort | head -50
          echo "------------------------------"

      - name: Set library path (for downstream commands)
        shell: bash
        run: |
          LEAN_SYSROOT=$(lean --print-prefix)
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "LD_LIBRARY_PATH=$LEAN_SYSROOT/lib/lean" >> $GITHUB_ENV
          else
            echo "DYLD_LIBRARY_PATH=$LEAN_SYSROOT/lib/lean" >> $GITHUB_ENV
          fi

      - name: Run tests
        run: uv run pytest tests -v

  # macOS-only: run the test suite under `leaks` to check for missing
  # ref-count drops. This is slower so kept on a separate job.
  memory-macos:
    runs-on: macos-latest
    needs: test
    continue-on-error: true   # leaks(1) reports of system frameworks are noisy
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Install Lean toolchain
        run: |
          elan toolchain install $(cat lean-toolchain)
          elan default $(cat lean-toolchain)
      - name: Install uv + deps
        uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv pip install sympy numpy
      - name: Build
        run: |
          lake build
          (cd tests/lean && lake build)
      - name: leaks(1) check
        run: tests/leaks_check.sh

  # Linux-only: build an ASAN-instrumented libleanshared.so, then run
  # the test suite with LEANPY_LIBLEAN pointing at it.
  asan-linux:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true   # ASAN may flag known upstream issues
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Install Lean toolchain
        run: |
          elan toolchain install $(cat lean-toolchain)
          elan default $(cat lean-toolchain)
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libgmp-dev libuv1-dev
      - name: Build ASAN-instrumented Lean runtime
        run: |
          LEAN_VERSION=$(cat lean-toolchain | sed 's|.*:||')
          git clone --depth 1 --branch "$LEAN_VERSION" https://github.com/leanprover/lean4.git lean4-src
          cd lean4-src
          # Patch CMakeLists to prevent ASAN flags from propagating to stage0
          sed -i 's/elseif((var MATCHES "CMAKE_.*") AND NOT (var MATCHES "CMAKE_BUILD_TYPE") AND NOT (var MATCHES "CMAKE_HOME_DIRECTORY"))/elseif((var MATCHES "CMAKE_.*") AND NOT (var MATCHES "CMAKE_BUILD_TYPE") AND NOT (var MATCHES "CMAKE_HOME_DIRECTORY") AND NOT (var MATCHES "CMAKE_C_FLAGS") AND NOT (var MATCHES "CMAKE_CXX_FLAGS") AND NOT (var MATCHES "CMAKE_EXE_LINKER_FLAGS") AND NOT (var MATCHES "CMAKE_SHARED_LINKER_FLAGS"))/' CMakeLists.txt
          mkdir -p build/release && cd build/release
          cmake -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address" \
            ../../
          make -j$(nproc) stage1 || true  # best-effort
      - name: Install uv + deps
        uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv pip install sympy numpy
      - name: Build
        run: |
          lake build
          (cd tests/lean && lake build)
      - name: Run tests under ASAN
        run: |
          ASAN_LIB=$(find lean4-src/build -name 'libleanshared.so' -print -quit 2>/dev/null || true)
          if [ -z "$ASAN_LIB" ]; then
            echo "::warning::ASAN libleanshared not found; skipping ASAN tests"
            exit 0
          fi
          echo "Using ASAN lib: $ASAN_LIB"
          # Find the matching libasan.so
          LIBASAN=$(gcc -print-file-name=libasan.so)
          LEANPY_LIBLEAN="$ASAN_LIB" \
          ASAN_OPTIONS=detect_leaks=0:halt_on_error=0 \
          LD_PRELOAD="$LIBASAN" \
          uv run pytest tests -v --tb=short 2>&1 | tee asan.log
          # Surface any ASAN errors as annotations
          if grep -q "ERROR: AddressSanitizer" asan.log; then
            echo "::warning::ASAN detected errors — see log for details"
          fi

  # Linux-only: run the test suite under valgrind for stronger coverage
  # of definite leaks.
  memory-linux:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true   # valgrind under Python interpreter is noisy
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Install Lean toolchain
        run: |
          elan toolchain install $(cat lean-toolchain)
          elan default $(cat lean-toolchain)
      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
      - name: Install uv + deps
        uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv pip install sympy numpy
      - name: Build
        run: |
          lake build
          (cd tests/lean && lake build)
      - name: valgrind check
        run: tests/leaks_check.sh
        env:
          PYTHONMALLOC: malloc
